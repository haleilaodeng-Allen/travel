<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>我的旅行世界</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#f5f0e8;--deep:#1a2744;--ocean:#4a9ebe;
  --coral:#e8826a;--gold:#c9a84c;--soft:#6b7a8d;
}
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;
  background:linear-gradient(180deg,#d6f0fa 0%,#b8e8f7 50%,#fdf4e3 100%);
  font-family:'Noto Sans SC',sans-serif;}

/* ── GLOBE SCREEN ── */
#globeScreen{position:fixed;inset:0;z-index:1;transition:opacity .6s}
#globeBox{width:100%;height:100%}

.globe-title{
  position:absolute;top:40px;left:50%;transform:translateX(-50%);
  color:var(--deep);font-family:'Playfair Display',serif;
  font-size:30px;font-weight:700;z-index:10;
  text-align:center;letter-spacing:1px;
  text-shadow:0 2px 12px rgba(255,255,255,.7);
}
.globe-sub{
  position:absolute;top:84px;left:50%;transform:translateX(-50%);
  color:var(--soft);font-size:13px;z-index:10;
  white-space:nowrap;letter-spacing:1px;
}

/* tooltip */
#tooltip{
  position:fixed;z-index:20;pointer-events:none;
  background:rgba(26,39,68,.88);color:#fff;
  padding:8px 16px;border-radius:20px;font-size:13px;
  letter-spacing:.5px;backdrop-filter:blur(6px);
  opacity:0;transition:opacity .2s;
  transform:translate(-50%,-160%);
}

/* add dest button */
#addDestGlobe{
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
  z-index:10;background:rgba(255,255,255,.75);
  border:1.5px dashed rgba(74,158,190,.5);
  color:var(--ocean);font-size:13px;
  font-family:'Noto Sans SC',sans-serif;
  padding:10px 24px;border-radius:30px;cursor:pointer;
  backdrop-filter:blur(6px);transition:all .2s;
}
#addDestGlobe:hover{background:rgba(255,255,255,.95);border-color:var(--ocean);}

/* ── DESTINATION SCREEN ── */
#destScreen{
  position:fixed;inset:0;z-index:50;
  background:var(--sand);
  transform:translateY(100%);
  transition:transform .55s cubic-bezier(.22,.68,0,1.2);
  display:flex;flex-direction:column;overflow:hidden;
}
#destScreen.open{transform:translateY(0);}

#dest-header{
  background:var(--deep);color:#fff;
  padding:20px 28px 16px;flex-shrink:0;
  display:flex;align-items:center;gap:16px;
}
#back-btn{
  background:rgba(255,255,255,.12);border:none;color:#fff;
  width:36px;height:36px;border-radius:50%;
  font-size:18px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  transition:background .2s;flex-shrink:0;
}
#back-btn:hover{background:rgba(255,255,255,.22);}
#dest-header-info{flex:1}
#dest-header-name{
  font-family:'Playfair Display',serif;font-size:24px;font-weight:700;
}
#dest-header-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px;}

.tab-bar{
  display:flex;gap:4px;background:rgba(255,255,255,.1);
  border-radius:8px;padding:3px;flex-shrink:0;
}
.tab{
  padding:6px 14px;border-radius:6px;font-size:12px;
  cursor:pointer;color:rgba(255,255,255,.6);
  transition:all .15s;font-family:'Noto Sans SC',sans-serif;
  border:none;background:transparent;white-space:nowrap;
}
.tab.active{background:rgba(255,255,255,.2);color:#fff;font-weight:500;}

#dest-content{flex:1;overflow-y:auto;padding:24px 28px;}

/* panels */
.panel{display:none}
.panel.active{display:block}

/* notes */
#notes-editor{
  width:100%;min-height:280px;border:1px solid #e4dfd5;
  border-radius:12px;padding:20px;
  font-family:'Playfair Display',serif;font-size:15px;
  line-height:2;color:#2c2c2c;background:#fff;
  resize:vertical;outline:none;transition:border-color .2s;
}
#notes-editor:focus{border-color:var(--ocean);}
.save-hint{font-size:11px;color:var(--soft);margin-top:8px;display:flex;align-items:center;gap:6px;}
.saved-dot{width:6px;height:6px;background:#4caf50;border-radius:50%;display:inline-block;}

/* media */
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px;}
.media-card{
  border-radius:10px;overflow:hidden;background:#fff;
  border:1px solid #e4dfd5;position:relative;
  aspect-ratio:4/3;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
}
.media-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);}
.media-card img,.media-card video{width:100%;height:100%;object-fit:cover;}
.del-media{
  position:absolute;top:6px;right:6px;
  background:rgba(0,0,0,.5);color:#fff;border:none;
  border-radius:50%;width:22px;height:22px;font-size:12px;
  cursor:pointer;display:none;align-items:center;justify-content:center;
}
.media-card:hover .del-media{display:flex;}
.upload-zone{
  border:2px dashed #e4dfd5;border-radius:12px;
  padding:28px;text-align:center;cursor:pointer;
  transition:all .2s;background:#fff;
}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--ocean);background:rgba(74,158,190,.04);}
.upload-zone .uz-icon{font-size:28px;margin-bottom:8px;}
.upload-zone p{font-size:13px;color:var(--soft);}
.upload-zone span{font-size:11px;color:#aaa;margin-top:4px;display:block;}
#file-input{display:none;}

.section-label{
  font-size:11px;font-weight:500;color:var(--soft);
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:12px;margin-top:20px;
}
.section-label:first-child{margin-top:0;}

.add-row{display:flex;gap:8px;margin-top:10px;}
.add-row input{
  flex:1;padding:9px 14px;border:1px solid #e4dfd5;
  border-radius:8px;font-size:13px;
  font-family:'Noto Sans SC',sans-serif;outline:none;background:#fff;
}
.add-row input:focus{border-color:var(--ocean);}
.btn-primary{
  padding:9px 16px;background:var(--deep);color:#fff;border:none;
  border-radius:8px;font-size:13px;font-family:'Noto Sans SC',sans-serif;
  cursor:pointer;transition:background .2s;white-space:nowrap;
}
.btn-primary:hover{background:#253560;}

/* links */
.link-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 16px;background:#fff;
  border:1px solid #e4dfd5;border-radius:10px;margin-bottom:8px;
}
.link-item a{flex:1;color:var(--ocean);text-decoration:none;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.link-item a:hover{text-decoration:underline;}
.link-label-tag{font-size:11px;color:var(--soft);flex-shrink:0;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.del-link{background:none;border:none;color:rgba(200,80,80,.4);cursor:pointer;font-size:15px;padding:2px 4px;flex-shrink:0;}
.del-link:hover{color:rgba(200,80,80,1);}

.video-embed{width:100%;aspect-ratio:16/9;border-radius:12px;border:none;margin-bottom:12px;}

/* ── ADD DEST MODAL ── */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.4);z-index:200;
  align-items:center;justify-content:center;
}
#modal-overlay.show{display:flex;}
#modal{
  background:#fff;border-radius:20px;padding:28px;width:340px;
  box-shadow:0 24px 60px rgba(0,0,0,.15);
}
#modal h3{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:16px;color:var(--deep);}
#modal input{
  width:100%;padding:10px 14px;border:1px solid #e4dfd5;
  border-radius:8px;font-size:14px;font-family:'Noto Sans SC',sans-serif;
  outline:none;margin-bottom:10px;
}
#modal input:focus{border-color:var(--ocean);}
.emoji-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.ep-btn{
  font-size:22px;padding:4px 8px;border-radius:8px;cursor:pointer;
  border:2px solid transparent;background:#f5f0e8;transition:all .15s;
}
.ep-btn.selected{border-color:var(--ocean);background:rgba(74,158,190,.1);}
.modal-row{display:flex;gap:10px;margin-top:4px;}
.btn-cancel{
  flex:1;padding:10px;background:#f0ece4;border:none;border-radius:8px;
  font-size:14px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;color:var(--soft);
}
.lat-lon-row{display:flex;gap:8px;}
.lat-lon-row input{flex:1;}

/* lightbox */
#lightbox{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);
  z-index:300;align-items:center;justify-content:center;
}
#lightbox.show{display:flex;}
#lightbox img,#lightbox video{max-width:90vw;max-height:90vh;border-radius:8px;}
#lightbox-close{
  position:absolute;top:20px;right:24px;color:#fff;
  font-size:28px;cursor:pointer;background:none;border:none;
}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:4px;}
</style>
</head>
<body>

<!-- ── GLOBE SCREEN ── -->
<div id="globeScreen">
  <div class="globe-title">✈ 我的旅行世界</div>
  <div class="globe-sub">点击地球上的标记，进入目的地</div>
  <div id="globeBox"></div>
  <div id="tooltip"></div>
  <button id="addDestGlobe">＋ 添加新目的地</button>
</div>

<!-- ── DESTINATION SCREEN ── -->
<div id="destScreen">
  <div id="dest-header">
    <button id="back-btn">←</button>
    <div id="dest-header-info">
      <div id="dest-header-name">目的地</div>
      <div id="dest-header-sub">DESTINATION</div>
    </div>
    <div class="tab-bar">
      <button class="tab active" data-tab="notes">📝 游记</button>
      <button class="tab" data-tab="media">🖼 相册</button>
      <button class="tab" data-tab="links">🔗 链接</button>
    </div>
  </div>
  <div id="dest-content">
    <div class="panel active" id="panel-notes">
      <div class="section-label">旅行游记</div>
      <textarea id="notes-editor" placeholder="在这里写下你的旅行故事、心情、见闻……"></textarea>
      <div class="save-hint"><span class="saved-dot"></span><span id="save-status">已自动保存</span></div>
    </div>
    <div class="panel" id="panel-media">
      <div class="section-label">照片 & 视频</div>
      <div class="media-grid" id="media-grid"></div>
      <div class="upload-zone" id="upload-zone">
        <div class="uz-icon">📁</div>
        <p>点击上传 或 拖拽文件到这里</p>
        <span>支持 JPG、PNG、GIF、MP4 等格式</span>
      </div>
      <input type="file" id="file-input" multiple accept="image/*,video/*,.gif">
      <div class="section-label" style="margin-top:22px">视频链接（YouTube / B站）</div>
      <div class="add-row">
        <input type="text" id="video-url-input" placeholder="粘贴视频链接">
        <button class="btn-primary" onclick="addVideoLink()">添加</button>
      </div>
      <div id="video-embeds"></div>
    </div>
    <div class="panel" id="panel-links">
      <div class="section-label">相关链接</div>
      <div id="links-list"></div>
      <div class="add-row">
        <input type="text" id="link-label-input" placeholder="备注" style="max-width:110px">
        <input type="text" id="link-url-input" placeholder="https://...">
        <button class="btn-primary" onclick="addLink()">添加</button>
      </div>
    </div>
  </div>
</div>

<!-- ── ADD DEST MODAL ── -->
<div id="modal-overlay">
  <div id="modal">
    <h3>添加新目的地</h3>
    <div class="section-label" style="margin-top:0;margin-bottom:8px">选个图标</div>
    <div class="emoji-picker" id="emoji-picker"></div>
    <input type="text" id="new-dest-name" placeholder="目的地名称，例如：东京" maxlength="20">
    <div class="lat-lon-row">
      <input type="number" id="new-dest-lat" placeholder="纬度，例如：35.68" step="0.01">
      <input type="number" id="new-dest-lon" placeholder="经度，例如：139.69" step="0.01">
    </div>
    <div class="modal-row" style="margin-top:12px">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-primary" style="flex:1" onclick="confirmAddDest()">添加到地球</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <div id="lightbox-content"></div>
</div>

<script>
// ════════════════════════════════════
//  DATA
// ════════════════════════════════════
const EMOJIS=['🏖','🏝','🗺','🏔','🌋','🌴','🗼','🏯','🌃','🎡','🚢','✈','🛕','⛩','🏜','🌊','🌸','🌺','🍜','🎎'];

const DEFAULT_DESTS=[
  {id:'maldives', name:'马尔代夫', nameEn:'Maldives', emoji:'🏝', lat:3.20, lon:73.22},
  {id:'bali',     name:'巴厘岛',   nameEn:'Bali',     emoji:'🌺', lat:-8.34, lon:115.09},
  {id:'bangkok',  name:'曼谷',     nameEn:'Bangkok',  emoji:'🛕', lat:13.75, lon:100.50},
  {id:'phuket',   name:'普吉岛',   nameEn:'Phuket',   emoji:'🏖', lat:7.88,  lon:98.39},
  {id:'abudhabi', name:'阿布扎比', nameEn:'Abu Dhabi',emoji:'🌃', lat:24.45, lon:54.37},
];

function loadState(){
  try{return JSON.parse(localStorage.getItem('globeJournal')||'null');}catch{return null;}
}
function saveState(){localStorage.setItem('globeJournal',JSON.stringify(state));}

let state=loadState()||{destinations:[...DEFAULT_DESTS],data:{}};

function destData(id){
  if(!state.data[id])state.data[id]={notes:'',media:[],links:[],videoLinks:[]};
  if(!state.data[id].videoLinks)state.data[id].videoLinks=[];
  return state.data[id];
}

let currentDest=null;
let currentTab='notes';
let saveTimer=null;

// ════════════════════════════════════
//  THREE.JS GLOBE
// ════════════════════════════════════
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,0,13);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.getElementById('globeBox').appendChild(renderer.domElement);

const globe=new THREE.Group();
scene.add(globe);

// ocean
globe.add(new THREE.Mesh(
  new THREE.SphereGeometry(5,96,96),
  new THREE.MeshStandardMaterial({color:0x7FD8E7,roughness:1})
));

// clouds
const clouds=new THREE.Mesh(
  new THREE.SphereGeometry(5.18,96,96),
  new THREE.MeshStandardMaterial({color:0xffffff,transparent:true,opacity:0.16,roughness:1})
);
scene.add(clouds);

// lights
scene.add(new THREE.AmbientLight(0xffffff,0.9));
const sun=new THREE.DirectionalLight(0xffffff,1.2);
sun.position.set(5,6,7);
scene.add(sun);

function latLonToVec3(lat,lon,r){
  const phi=(90-lat)*Math.PI/180;
  const theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
}

// blob land
function createBlobLand(lat,lon,size=1){
  const group=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:0xF5E6C8,roughness:1});
  [[0,0,.35],[.32,.12,.26],[-.28,.08,.25],[.1,-.22,.28],[-.12,-.32,.2]].forEach(b=>{
    const m=new THREE.Mesh(new THREE.SphereGeometry(b[2]*size,24,24),mat);
    m.position.set(b[0]*size,b[1]*size,0);m.scale.z=0.18;group.add(m);
  });
  group.position.copy(latLonToVec3(lat,lon,5.08));
  group.lookAt(0,0,0);group.rotateY(Math.PI);globe.add(group);
}
createBlobLand(25,95,1.1);createBlobLand(5,115,0.8);createBlobLand(-8,135,0.75);
createBlobLand(35,35,0.95);createBlobLand(-20,45,0.85);
createBlobLand(10,-75,1.1);createBlobLand(-25,-60,0.9);

// ── MOUNTAIN ──
function addMountain(lat,lon,size=1){
  const group=new THREE.Group();
  // snow peak
  const peak=new THREE.Mesh(
    new THREE.ConeGeometry(0.18*size,0.38*size,8),
    new THREE.MeshStandardMaterial({color:0xffffff,roughness:.9})
  );
  peak.position.y=0.18*size;
  // body
  const body=new THREE.Mesh(
    new THREE.ConeGeometry(0.28*size,0.32*size,8),
    new THREE.MeshStandardMaterial({color:0x9DB88A,roughness:.9})
  );
  body.position.y=0;
  group.add(body,peak);
  const pos=latLonToVec3(lat,lon,5.1);
  group.position.copy(pos);
  group.lookAt(new THREE.Vector3(0,0,0));
  group.rotateX(-Math.PI/2);
  globe.add(group);
}
addMountain(28,84,1.1);   // Himalayas
addMountain(46,8,0.85);   // Alps
addMountain(35,138,0.75); // Japan Fuji
addMountain(-33,-70,0.8); // Andes
addMountain(63,-18,0.7);  // Iceland

// ── TREE (palm-style) ──
function addTree(lat,lon,size=1){
  const group=new THREE.Group();
  const trunk=new THREE.Mesh(
    new THREE.CylinderGeometry(0.025*size,0.04*size,0.28*size,6),
    new THREE.MeshStandardMaterial({color:0xA07850,roughness:1})
  );
  trunk.position.y=0.14*size;
  // canopy blobs
  const leafMat=new THREE.MeshStandardMaterial({color:0x4CAF50,roughness:1});
  [[0,.28,.1],[.08,.24,.08],[-.08,.24,.08],[0,.2,.09]].forEach(b=>{
    const leaf=new THREE.Mesh(new THREE.SphereGeometry(b[2]*size,8,8),leafMat);
    leaf.position.set(b[0]*size,b[1]*size,0);
    group.add(leaf);
  });
  group.add(trunk);
  const pos=latLonToVec3(lat,lon,5.1);
  group.position.copy(pos);
  group.lookAt(new THREE.Vector3(0,0,0));
  group.rotateX(-Math.PI/2);
  globe.add(group);
}
addTree(3.2,73.2,0.9);    // Maldives
addTree(-8.3,115.1,0.85); // Bali
addTree(7.9,98.4,0.85);   // Phuket
addTree(10,-75,0.8);      // Caribbean
addTree(-20,45,0.75);     // Madagascar
addTree(4,108,0.8);       // Borneo

// ── BEACH (flat sandy arc) ──
function addBeach(lat,lon,angle=0,size=1){
  const group=new THREE.Group();
  const beachMat=new THREE.MeshStandardMaterial({color:0xF5DFA0,roughness:1});
  // flat wedge shape using scaled sphere
  const beach=new THREE.Mesh(
    new THREE.SphereGeometry(0.22*size,16,8,0,Math.PI),
    beachMat
  );
  beach.scale.set(1,0.12,0.5);
  beach.rotation.z=angle;
  group.add(beach);
  const pos=latLonToVec3(lat,lon,5.06);
  group.position.copy(pos);
  group.lookAt(new THREE.Vector3(0,0,0));
  group.rotateX(-Math.PI/2);
  globe.add(group);
}
addBeach(7.9,98.4,0.3,0.9);   // Phuket
addBeach(3.2,73.3,0,0.8);     // Maldives
addBeach(-8.4,115.2,0.5,0.75);// Bali
addBeach(25.2,55.3,0,0.7);    // Dubai coast
addBeach(18,-66,0.2,0.8);     // Caribbean

// markers
const markerObjects=[];

function addMarker(dest){
  const group=new THREE.Group();
  group.userData={destId:dest.id,name:dest.name};

  // pin sphere
  const pin=new THREE.Mesh(
    new THREE.SphereGeometry(0.12,24,24),
    new THREE.MeshBasicMaterial({color:0xFF8A65})
  );
  pin.position.copy(latLonToVec3(dest.lat,dest.lon,5.38));
  group.add(pin);

  // glow ring
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(0.18,0.03,8,32),
    new THREE.MeshBasicMaterial({color:0xFF8A65,transparent:true,opacity:0.5})
  );
  ring.position.copy(latLonToVec3(dest.lat,dest.lon,5.38));
  ring.lookAt(0,0,0);
  group.add(ring);

  // label sprite
  const canvas=document.createElement('canvas');
  canvas.width=300;canvas.height=72;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='rgba(26,39,68,0.85)';
  roundRect(ctx,0,10,canvas.width,50,14);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font='bold 26px Arial';
  ctx.textAlign='center';
  ctx.fillText(dest.emoji+' '+dest.name,canvas.width/2,46);
  const tex=new THREE.CanvasTexture(canvas);
  const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
  sprite.position.copy(latLonToVec3(dest.lat,dest.lon,5.95));
  sprite.scale.set(2.2,0.55,1);
  group.add(sprite);

  globe.add(group);
  markerObjects.push({group,pin,ring,dest});
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function rebuildMarkers(){
  // remove old
  markerObjects.forEach(m=>globe.remove(m.group));
  markerObjects.length=0;
  state.destinations.forEach(d=>addMarker(d));
}
rebuildMarkers();

// OrbitControls
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.06;
controls.enableZoom=true;controls.enablePan=false;
controls.minDistance=8;controls.maxDistance=18;
controls.autoRotate=true;controls.autoRotateSpeed=0.6;

// raycaster for click
const raycaster=new THREE.Raycaster();
raycaster.params.Points={threshold:0.3};
const mouse=new THREE.Vector2();
const tooltip=document.getElementById('tooltip');
let hoveredDest=null;
let mouseDownPos={x:0,y:0};
let isDragging=false;

function updateRaycast(clientX,clientY){
  mouse.x=(clientX/window.innerWidth)*2-1;
  mouse.y=-(clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  let found=null;
  // check pins and rings (larger hit area)
  markerObjects.forEach(m=>{
    const hits=raycaster.intersectObjects([m.pin,m.ring],true);
    if(hits.length>0)found=m.dest;
  });
  return found;
}

renderer.domElement.addEventListener('mousemove',e=>{
  const found=updateRaycast(e.clientX,e.clientY);
  if(found){
    hoveredDest=found;
    tooltip.style.left=e.clientX+'px';
    tooltip.style.top=e.clientY+'px';
    tooltip.textContent='点击进入 '+found.emoji+' '+found.name;
    tooltip.style.opacity=1;
    renderer.domElement.style.cursor='pointer';
  } else {
    hoveredDest=null;
    tooltip.style.opacity=0;
    renderer.domElement.style.cursor='grab';
  }
});

renderer.domElement.addEventListener('mousedown',e=>{
  mouseDownPos={x:e.clientX,y:e.clientY};
  isDragging=false;
});

renderer.domElement.addEventListener('mousemove',e=>{
  const dx=e.clientX-mouseDownPos.x, dy=e.clientY-mouseDownPos.y;
  if(Math.sqrt(dx*dx+dy*dy)>4) isDragging=true;
},{passive:true});

renderer.domElement.addEventListener('mouseup',e=>{
  if(isDragging){isDragging=false;return;}
  // re-check raycast at exact click position
  const found=updateRaycast(e.clientX,e.clientY);
  if(found) openDest(found.id);
});

// touch support
renderer.domElement.addEventListener('touchend',e=>{
  if(isDragging){isDragging=false;return;}
  const t=e.changedTouches[0];
  const found=updateRaycast(t.clientX,t.clientY);
  if(found) openDest(found.id);
},{passive:true});

// animate
function animate(){
  requestAnimationFrame(animate);
  clouds.rotation.y+=0.0007;
  // pulse rings
  const t=Date.now()*0.002;
  markerObjects.forEach((m,i)=>{
    const s=1+0.15*Math.sin(t+i);
    m.ring.scale.set(s,s,s);
  });
  controls.update();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ════════════════════════════════════
//  DESTINATION SCREEN
// ════════════════════════════════════
function openDest(id){
  const pageMap={
    'maldives':'maldives.html',
    'bali':'bali.html',
    'bangkok':'bangkok.html',
    'phuket':'phuket.html',
    'abudhabi':'abudhabi.html',
  };
  const page=pageMap[id];
  if(page){
    window.location.href=page;
  } else {
    alert('该目的地页面即将上线 🌏');
  }
}

document.getElementById('back-btn').addEventListener('click',()=>{
  document.getElementById('destScreen').classList.remove('open');
  currentDest=null;
});

document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(!currentDest)return;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    currentTab=btn.dataset.tab;
    showPanel(currentTab);
  });
});

function showPanel(tab){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='notes')renderNotes();
  if(tab==='media')renderMedia();
  if(tab==='links')renderLinks();
}

// NOTES
function renderNotes(){
  const d=destData(currentDest);
  document.getElementById('notes-editor').value=d.notes||'';
  document.getElementById('save-status').textContent='已自动保存';
}
document.getElementById('notes-editor').addEventListener('input',function(){
  document.getElementById('save-status').textContent='正在保存…';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    if(currentDest){destData(currentDest).notes=this.value;saveState();
    document.getElementById('save-status').textContent='已自动保存';}
  },600);
});

// MEDIA
function renderMedia(){
  const d=destData(currentDest);
  const grid=document.getElementById('media-grid');
  grid.innerHTML='';
  d.media.forEach((m,i)=>{
    const card=document.createElement('div');
    card.className='media-card';
    if(m.type==='video'){
      card.innerHTML=`<video src="${m.src}" muted></video>`;
      card.querySelector('video').addEventListener('click',()=>openLightbox('video',m.src));
    } else {
      card.innerHTML=`<img src="${m.src}" loading="lazy">`;
      card.querySelector('img').addEventListener('click',()=>openLightbox('img',m.src));
    }
    const del=document.createElement('button');
    del.className='del-media';del.textContent='✕';
    del.addEventListener('click',e=>{e.stopPropagation();deleteMedia(i);});
    card.appendChild(del);grid.appendChild(card);
  });
  // video embeds
  const ve=document.getElementById('video-embeds');ve.innerHTML='';
  d.videoLinks.forEach((url,i)=>{
    const em=toEmbedUrl(url);
    if(em){
      const wrap=document.createElement('div');
      wrap.style.cssText='position:relative;margin-bottom:12px;margin-top:12px';
      wrap.innerHTML=`<iframe class="video-embed" src="${em}" allowfullscreen></iframe>
        <button onclick="deleteVideoLink(${i})" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:13px">✕</button>`;
      ve.appendChild(wrap);
    }
  });
}
function toEmbedUrl(url){
  try{
    if(url.includes('youtu.be/')){const id=url.split('youtu.be/')[1].split('?')[0];return`https://www.youtube.com/embed/${id}`;}
    if(url.includes('youtube.com/watch')){const u=new URL(url);return`https://www.youtube.com/embed/${u.searchParams.get('v')}`;}
    if(url.includes('bilibili.com/video/')){const bv=url.match(/BV\w+/)?.[0];return bv?`https://player.bilibili.com/player.html?bvid=${bv}`:null;}
    return null;
  }catch{return null;}
}
const uploadZone=document.getElementById('upload-zone');
const fileInput=document.getElementById('file-input');
uploadZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>handleFiles(e.target.files));
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('drag-over');});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('drag-over');handleFiles(e.dataTransfer.files);});
function handleFiles(files){
  if(!currentDest)return;
  const d=destData(currentDest);let loaded=0;
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      d.media.push({type:file.type.startsWith('video')?'video':'image',src:e.target.result,name:file.name});
      if(++loaded===files.length){saveState();renderMedia();}
    };reader.readAsDataURL(file);
  });
}
function deleteMedia(i){destData(currentDest).media.splice(i,1);saveState();renderMedia();}
function addVideoLink(){
  const input=document.getElementById('video-url-input');
  const url=input.value.trim();if(!url||!currentDest)return;
  destData(currentDest).videoLinks.push(url);input.value='';saveState();renderMedia();
}
function deleteVideoLink(i){destData(currentDest).videoLinks.splice(i,1);saveState();renderMedia();}

// LINKS
function renderLinks(){
  const d=destData(currentDest);
  const list=document.getElementById('links-list');list.innerHTML='';
  if(!d.links.length){list.innerHTML='<p style="color:var(--soft);font-size:13px;margin-bottom:16px">还没有链接，添加酒店、攻略等</p>';}
  d.links.forEach((lk,i)=>{
    const div=document.createElement('div');div.className='link-item';
    div.innerHTML=`<span class="link-label-tag">${lk.label||'链接'}</span>
      <a href="${lk.url}" target="_blank" rel="noopener">${lk.url}</a>
      <button class="del-link" onclick="deleteLink(${i})">✕</button>`;
    list.appendChild(div);
  });
}
function addLink(){
  const label=document.getElementById('link-label-input').value.trim();
  const url=document.getElementById('link-url-input').value.trim();
  if(!url||!currentDest)return;
  let fu=url;if(!/^https?:\/\//i.test(url))fu='https://'+url;
  destData(currentDest).links.push({label:label||'链接',url:fu});
  document.getElementById('link-label-input').value='';
  document.getElementById('link-url-input').value='';
  saveState();renderLinks();
}
function deleteLink(i){destData(currentDest).links.splice(i,1);saveState();renderLinks();}

// ════════════════════════════════════
//  ADD DEST MODAL
// ════════════════════════════════════
let selectedEmoji=EMOJIS[0];
document.getElementById('addDestGlobe').addEventListener('click',openModal);
function openModal(){
  selectedEmoji=EMOJIS[0];
  const picker=document.getElementById('emoji-picker');picker.innerHTML='';
  EMOJIS.forEach(em=>{
    const btn=document.createElement('button');
    btn.className='ep-btn'+(em===selectedEmoji?' selected':'');
    btn.textContent=em;
    btn.addEventListener('click',()=>{selectedEmoji=em;document.querySelectorAll('.ep-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');});
    picker.appendChild(btn);
  });
  document.getElementById('new-dest-name').value='';
  document.getElementById('new-dest-lat').value='';
  document.getElementById('new-dest-lon').value='';
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('new-dest-name').focus(),100);
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
document.getElementById('new-dest-name').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddDest();});

function confirmAddDest(){
  const name=document.getElementById('new-dest-name').value.trim();
  if(!name){document.getElementById('new-dest-name').focus();return;}
  const lat=parseFloat(document.getElementById('new-dest-lat').value)||0;
  const lon=parseFloat(document.getElementById('new-dest-lon').value)||0;
  const id='dest_'+Date.now();
  state.destinations.push({id,name,nameEn:name,emoji:selectedEmoji,lat,lon});
  saveState();closeModal();rebuildMarkers();
}

// LIGHTBOX
function openLightbox(type,src){
  const lbc=document.getElementById('lightbox-content');
  lbc.innerHTML=type==='img'?`<img src="${src}">`:`<video src="${src}" controls autoplay style="max-width:90vw;max-height:90vh;border-radius:8px"></video>`;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show');document.getElementById('lightbox-content').innerHTML='';}
</script>
