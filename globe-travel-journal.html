<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>我的旅行世界</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--deep:#2d4a3e;--coral:#e8826a;--soft:#7a9e8e;}
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:100vw;height:100vh;overflow:hidden;
  background:linear-gradient(180deg,#0a2a4a 0%,#1a5080 20%,#2a88c8 45%,#8dd8f0 70%,#fdf4e3 100%);
  font-family:'Noto Sans SC',sans-serif;
}
#globeBox{position:absolute;inset:0;}
#sky-bg{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.cloud-group{position:absolute;pointer-events:none;animation:cloudFloat linear infinite;}
@keyframes cloudFloat{0%{transform:translateX(-350px)}100%{transform:translateX(calc(100vw + 350px))}}
.cloud-puff{position:absolute;background:rgba(255,255,255,0.45);border-radius:50%;filter:blur(4px);}

.globe-title{
  position:absolute;top:32px;left:50%;transform:translateX(-50%);
  z-index:10;text-align:center;white-space:nowrap;
  font-family:'Ma Shan Zheng',cursive;font-size:36px;
  color:#fff;letter-spacing:4px;
  text-shadow:0 2px 20px rgba(0,100,200,.5),0 1px 4px rgba(0,0,0,0.2);
}
.globe-title .icon{display:inline-block;font-size:30px;margin-right:8px;animation:iconBob 3s ease-in-out infinite;}
@keyframes iconBob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-5px) rotate(5deg)}}
.globe-sub{
  position:absolute;top:82px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.75);z-index:10;white-space:nowrap;
  font-family:'Caveat',cursive;font-size:17px;letter-spacing:2px;
  text-shadow:0 1px 8px rgba(0,0,0,0.2);
}
#tooltip{
  position:fixed;z-index:20;pointer-events:none;
  background:rgba(10,42,74,.9);color:#fff;
  padding:8px 18px;border-radius:24px;font-size:13px;
  letter-spacing:.5px;backdrop-filter:blur(6px);
  opacity:0;transition:opacity .2s;transform:translate(-50%,-160%);
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
#addDestGlobe{
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
  z-index:10;background:rgba(255,255,255,.18);
  border:1.5px solid rgba(255,255,255,0.4);
  color:#fff;font-family:'Caveat',cursive;font-size:16px;
  padding:10px 28px;border-radius:30px;cursor:pointer;
  backdrop-filter:blur(8px);transition:all .2s;letter-spacing:1px;
}
#addDestGlobe:hover{background:rgba(255,255,255,.28);}

#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;}
#modal-overlay.show{display:flex;}
#modal{background:#fff;border-radius:20px;padding:28px;width:340px;box-shadow:0 24px 60px rgba(0,0,0,.2);}
#modal h3{font-family:'Ma Shan Zheng',cursive;font-size:22px;margin-bottom:16px;color:var(--deep);letter-spacing:2px;}
#modal input{width:100%;padding:10px 14px;border:1px solid #e0dbd5;border-radius:8px;font-size:14px;font-family:'Noto Sans SC',sans-serif;outline:none;margin-bottom:10px;}
#modal input:focus{border-color:#5bc8dc;}
.emoji-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.ep-btn{font-size:22px;padding:4px 8px;border-radius:8px;cursor:pointer;border:2px solid transparent;background:#f5f0e8;transition:all .15s;}
.ep-btn.selected{border-color:#5bc8dc;background:rgba(91,200,220,.1);}
.modal-row{display:flex;gap:10px;margin-top:4px;}
.lat-lon-row{display:flex;gap:8px;}.lat-lon-row input{flex:1;}
.btn-cancel{flex:1;padding:10px;background:#f0ece4;border:none;border-radius:8px;font-size:14px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;color:var(--soft);}
.btn-primary{padding:9px 16px;background:var(--deep);color:#fff;border:none;border-radius:8px;font-size:14px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;flex:1;}
.section-label{font-size:11px;font-weight:500;color:var(--soft);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
</style>
</head>
<body>

<div id="sky-bg">
  <div class="cloud-group" style="top:6%;animation-duration:60s;animation-delay:-8s">
    <div class="cloud-puff" style="width:130px;height:65px;left:0;top:0;opacity:0.4"></div>
    <div class="cloud-puff" style="width:90px;height:55px;left:80px;top:-16px;opacity:0.36"></div>

    <div class="cloud-puff" style="width:150px;height:70px;left:60px;top:-20px;opacity:0.34"></div>
    <div class="cloud-puff" style="width:85px;height:52px;left:175px;top:-5px;opacity:0.28"></div>
  </div>
  <div class="cloud-group" style="top:75%;animation-duration:95s;animation-delay:-50s">
    <div class="cloud-puff" style="width:110px;height:52px;left:0;top:0;opacity:0.22"></div>
    <div class="cloud-puff" style="width:75px;height:44px;left:72px;top:-12px;opacity:0.2"></div>
    <div class="cloud-puff" style="width:90px;height:50px;left:120px;top:4px;opacity:0.18"></div>
  </div>
  <div class="cloud-group" style="top:35%;animation-duration:70s;animation-delay:-20s">
    <div class="cloud-puff" style="width:65px;height:34px;left:0;top:0;opacity:0.22"></div>
    <div class="cloud-puff" style="width:95px;height:44px;left:42px;top:-12px;opacity:0.25"></div>
  </div>
  <div class="cloud-group" style="top:4%;animation-duration:85s;animation-delay:-55s">
    <div class="cloud-puff" style="width:120px;height:58px;left:50px;top:-18px;opacity:0.28"></div>
    <div class="cloud-puff" style="width:70px;height:40px;left:145px;top:-5px;opacity:0.24"></div>
  </div>
</div>

<div class="globe-title"><span class="icon">🌏</span>我的旅行世界</div>
<div class="globe-sub">点击目的地，开始你的旅程 ✈</div>
<div id="globeBox"></div>
<div id="tooltip"></div>
<button id="addDestGlobe">＋ 添加新目的地</button>

<div id="modal-overlay">
  <div id="modal">
    <h3>添加新目的地</h3>
    <div class="section-label">选个图标</div>
    <div class="emoji-picker" id="emoji-picker"></div>
    <input type="text" id="new-dest-name" placeholder="目的地名称" maxlength="20">
    <div class="lat-lon-row">
      <input type="number" id="new-dest-lat" placeholder="纬度 例：35.68" step="0.01">
      <input type="number" id="new-dest-lon" placeholder="经度 例：139.69" step="0.01">
    </div>
    <div class="modal-row" style="margin-top:12px">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="confirmAddDest()">添加到地球</button>
    </div>
  </div>
</div>

<script>
const EMOJIS=['🏖','🏝','🗺','🏔','🌋','🌴','🗼','🏯','🌃','🎡','🚢','✈','🛕','⛩','🏜','🌊','🌸','🌺','🍜','🎎'];
const DEFAULT_DESTS=[
  {id:'maldives',name:'马尔代夫',nameEn:'Maldives',emoji:'🏝',lat:3.20,lon:73.22},
  {id:'bali',    name:'巴厘岛',  nameEn:'Bali',    emoji:'🌺',lat:-8.34,lon:115.09},
  {id:'bangkok', name:'曼谷',    nameEn:'Bangkok', emoji:'🛕',lat:13.75,lon:100.50},
  {id:'phuket',  name:'普吉岛',  nameEn:'Phuket',  emoji:'🏖',lat:7.88, lon:98.39},
  {id:'abudhabi',name:'阿布扎比',nameEn:'Abu Dhabi',emoji:'🌃',lat:24.45,lon:54.37},
];
function loadState(){try{return JSON.parse(localStorage.getItem('globeJournal3')||'null');}catch{return null;}}
function saveState(){localStorage.setItem('globeJournal3',JSON.stringify(state));}
let state=loadState()||{destinations:[...DEFAULT_DESTS]};

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,0,13);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.getElementById('globeBox').appendChild(renderer.domElement);

const globe=new THREE.Group();
scene.add(globe);

// ── OCEAN BASE - medium blue, not too dark ──
globe.add(new THREE.Mesh(
  new THREE.SphereGeometry(5,96,96),
  new THREE.MeshStandardMaterial({color:0x1a8ab8,roughness:0.6,metalness:0.08})
));

// ── SHALLOW OCEAN LAYER (tropical jellyfish color) ──
function addShallowSea(lat,lon,size=1){
  const group=new THREE.Group();
  // bright jellyfish teal - higher opacity and sits on top
  const mat=new THREE.MeshStandardMaterial({
    color:0x00e8d4,transparent:true,opacity:0.75,roughness:0.3,metalness:0.05
  });
  const patch=new THREE.Mesh(new THREE.SphereGeometry(size,20,20),mat);
  patch.scale.z=0.15;
  group.position.copy(latLonToVec3(lat,lon,5.04));
  group.lookAt(0,0,0);group.rotateY(Math.PI);
  group.add(patch);globe.add(group);
}
// tropical shallow seas
addShallowSea(3,73,1.4);    // Maldives lagoons
addShallowSea(-8,115,1.2);  // Bali coast
addShallowSea(7.9,98,1.1);  // Phuket
addShallowSea(10,125,1.0);  // Philippines
addShallowSea(-18,-149,0.9);// Tahiti
addShallowSea(21,157,1.0);  // Hawaii
addShallowSea(-17,178,0.85);// Fiji
addShallowSea(18,-66,0.9);  // Caribbean
addShallowSea(24,54,1.0);   // Gulf/Abu Dhabi
addShallowSea(1,104,0.85);  // Singapore strait
addShallowSea(-10,150,0.8); // PNG
addShallowSea(15,55,0.9);   // Arabian Sea

// ── MID OCEAN - medium blue ──
function addMidOcean(lat,lon,size=1){
  const group=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:0x1a7aaa,transparent:true,opacity:0.4,roughness:0.7});
  const patch=new THREE.Mesh(new THREE.SphereGeometry(size,16,16),mat);
  patch.scale.z=0.1;
  group.position.copy(latLonToVec3(lat,lon,5.01));
  group.lookAt(0,0,0);group.rotateY(Math.PI);group.add(patch);globe.add(group);
}
addMidOcean(15,80,1.5);addMidOcean(-5,80,1.3);addMidOcean(0,160,1.4);
addMidOcean(-30,-150,1.6);addMidOcean(30,-50,1.5);addMidOcean(-20,80,1.2);

// lights
scene.add(new THREE.AmbientLight(0xffffff,1.0));
const sun=new THREE.DirectionalLight(0xfff8e0,1.1);sun.position.set(6,8,5);scene.add(sun);
const rimLight=new THREE.DirectionalLight(0x88ccff,0.4);rimLight.position.set(-6,-4,-5);scene.add(rimLight);

// clouds layer on globe
const clouds=new THREE.Mesh(
  new THREE.SphereGeometry(5.22,64,64),
  new THREE.MeshStandardMaterial({color:0xffffff,transparent:true,opacity:0.11,roughness:1})
);
scene.add(clouds);

function latLonToVec3(lat,lon,r){
  const phi=(90-lat)*Math.PI/180;
  const theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
}

// ── CONTINENTS ──
function createContinent(patches){
  patches.forEach(([lat,lon,size,variant])=>{
    const group=new THREE.Group();
    const colors=[0x8BC34A,0x7cb342,0x6aa329,0x9CCC65,0x5d9b28];
    const mat=new THREE.MeshStandardMaterial({color:colors[variant||0],roughness:0.88});
    const main=new THREE.Mesh(new THREE.SphereGeometry(size,18,18),mat);
    main.scale.z=0.22;group.add(main);
    group.position.copy(latLonToVec3(lat,lon,5.05));
    group.lookAt(0,0,0);group.rotateY(Math.PI);globe.add(group);
  });
}
createContinent([[60,60,1.1,0],[55,75,1.0,2],[50,90,1.2,1],[45,100,1.1,0],[40,110,1.0,2],[35,105,1.15,1],[30,90,1.0,0],[25,80,1.1,2],[20,75,0.9,1],[15,78,0.85,0],[10,78,0.75,2],[8,77,0.7,1],[22,113,0.8,0],[25,120,0.85,2],[30,120,0.9,1],[35,118,0.8,0],[38,125,0.75,2],[45,130,0.7,1],[50,135,0.75,0],[55,60,0.9,2],[48,68,1.0,1],[42,78,0.9,0],[38,58,0.85,2],[33,48,0.8,1],[28,50,0.75,0],[23,58,0.7,2],[18,44,0.65,1],[15,42,0.7,0],[25,50,0.8,2],[30,68,0.9,1],[35,72,0.85,0],[40,68,0.8,2],[10,106,0.75,1],[5,103,0.7,0],[3,108,0.72,2],[-2,115,0.75,1],[-5,120,0.7,0],[0,109,0.68,2],[2,112,0.65,1]]);
createContinent([[55,10,0.85,0],[52,5,0.8,2],[50,4,0.75,1],[48,2,0.7,0],[46,8,0.72,2],[44,12,0.68,1],[42,13,0.7,0],[40,16,0.65,2],[51,0,0.72,2],[53,-2,0.7,1],[55,-3,0.65,0],[57,10,0.75,2],[60,10,0.7,1],[62,14,0.68,0],[64,26,0.65,2],[60,24,0.7,1],[48,18,0.68,2],[47,19,0.65,1],[46,14,0.6,0],[44,20,0.62,2],[42,23,0.58,1],[40,22,0.55,0],[36,-5,0.58,1],[38,-7,0.6,0],[40,-3,0.62,2],[42,-2,0.58,1]]);
createContinent([[35,5,0.8,0],[33,10,0.85,2],[30,20,0.9,1],[25,28,0.95,0],[20,30,1.0,2],[15,30,1.0,1],[10,25,1.0,0],[5,22,0.95,2],[0,22,0.9,1],[-5,25,0.9,0],[-10,28,0.88,2],[-15,30,0.85,1],[-20,32,0.82,0],[-25,28,0.8,2],[-30,25,0.75,1],[-32,27,0.7,0],[20,5,0.9,2],[15,5,0.88,1],[10,5,0.85,0],[5,5,0.8,2],[0,10,0.78,1],[-5,12,0.75,0],[10,42,0.7,1],[5,38,0.72,0],[0,38,0.68,2],[-5,40,0.65,1],[-15,45,0.6,0]]);
createContinent([[70,-100,0.9,0],[65,-95,1.0,2],[60,-100,1.1,1],[55,-100,1.1,0],[50,-95,1.0,2],[45,-78,0.9,1],[42,-80,0.85,0],[40,-82,0.8,2],[35,-88,0.8,0],[32,-92,0.82,2],[30,-92,0.8,1],[25,-100,0.75,2],[22,-100,0.7,1],[20,-99,0.72,0],[50,-115,0.95,1],[55,-120,1.0,0],[60,-130,0.95,2],[65,-140,0.9,1],[58,-110,0.9,2],[55,-110,0.85,1],[50,-110,0.8,0],[45,-110,0.78,2],[40,-75,0.8,2],[45,-70,0.75,1],[65,-60,0.7,2],[70,-80,0.75,1],[75,-90,0.7,0]]);
createContinent([[10,-70,0.8,0],[5,-65,0.85,2],[0,-60,0.9,1],[-5,-58,0.92,0],[-10,-55,0.9,2],[-15,-52,0.88,1],[-20,-48,0.85,0],[-25,-50,0.82,2],[-30,-52,0.78,1],[-35,-60,0.75,0],[-38,-65,0.72,2],[-45,-68,0.7,1],[-50,-70,0.68,0],[-15,-72,0.8,1],[-10,-74,0.78,0],[-5,-72,0.75,2],[0,-70,0.72,1]]);
createContinent([[-25,132,0.9,0],[-28,135,0.88,2],[-30,138,0.85,1],[-32,140,0.8,0],[-35,138,0.78,2],[-33,145,0.75,1],[-28,145,0.72,0],[-22,148,0.68,1],[-20,142,0.65,0],[-18,138,0.68,2],[-22,132,0.72,1],[-28,122,0.7,0],[-32,118,0.65,2],[-42,172,0.65,2],[-40,175,0.62,1]]);
createContinent([[72,-40,0.8,0],[70,-45,0.75,2],[68,-28,0.7,1],[64,-22,0.62,0],[65,-18,0.58,2]]);

// ── WHITE SAND HALOS around islands ──
function addSandHalo(lat,lon,size=1){
  const group=new THREE.Group();
  // outer white glow
  const outer=new THREE.Mesh(
    new THREE.SphereGeometry(size*1.5,20,20),
    new THREE.MeshStandardMaterial({color:0xffffff,transparent:true,opacity:0.18,roughness:1})
  );
  outer.scale.z=0.06;
  // sand ring
  const sand=new THREE.Mesh(
    new THREE.SphereGeometry(size*1.1,20,20),
    new THREE.MeshStandardMaterial({color:0xf5e8b0,transparent:true,opacity:0.55,roughness:1})
  );
  sand.scale.z=0.08;
  group.add(outer,sand);
  group.position.copy(latLonToVec3(lat,lon,5.02));
  group.lookAt(0,0,0);group.rotateY(Math.PI);globe.add(group);
}
addSandHalo(3.2,73.2,0.9);   // Maldives
addSandHalo(-8.3,115.1,0.8); // Bali
addSandHalo(7.9,98.4,0.8);   // Phuket
addSandHalo(24.45,54.37,0.7);// Abu Dhabi
addSandHalo(-18,-149,0.75);  // Tahiti
addSandHalo(21,157,0.8);     // Hawaii
addSandHalo(-17,178,0.7);    // Fiji
addSandHalo(18,-66,0.75);    // Caribbean
addSandHalo(1,104,0.65);     // Singapore
addSandHalo(-10,150,0.65);   // PNG

// ── RAINBOW ARC - short beautiful arc, not full circle ──
const rainbowColors=[0xff5555,0xff9900,0xffee00,0x44dd44,0x2299ff,0x7755ff,0xdd55cc];
rainbowColors.forEach((col,i)=>{
  const r=5.6+i*0.07;
  // Math.PI*0.55 = about 100 degrees arc only
  const torusGeo=new THREE.TorusGeometry(r,0.028,8,80,Math.PI*0.55);
  const mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.28-i*0.02,side:THREE.DoubleSide});
  const arc=new THREE.Mesh(torusGeo,mat);
  // position it nicely on one side of globe
  arc.rotation.z=Math.PI*0.15;
  arc.rotation.y=Math.PI*0.3;
  arc.rotation.x=Math.PI*0.1;
  scene.add(arc);
});

// ── MOUNTAINS ──
function addMountain(lat,lon,size=1,snowy=true){
  const group=new THREE.Group();
  const base=new THREE.Mesh(new THREE.ConeGeometry(0.3*size,0.2*size,7),new THREE.MeshStandardMaterial({color:0x7cb342,roughness:0.9}));
  base.position.y=-0.04*size;
  const peak=new THREE.Mesh(new THREE.ConeGeometry(0.2*size,0.4*size,7),new THREE.MeshStandardMaterial({color:0x558b2f,roughness:0.9}));
  peak.position.y=0.14*size;group.add(base,peak);
  if(snowy){
    const snow=new THREE.Mesh(new THREE.ConeGeometry(0.09*size,0.15*size,7),new THREE.MeshStandardMaterial({color:0xfafafa,roughness:0.9}));
    snow.position.y=0.33*size;group.add(snow);
  }
  const pos=latLonToVec3(lat,lon,5.1);
  group.position.copy(pos);group.lookAt(new THREE.Vector3(0,0,0));group.rotateX(-Math.PI/2);globe.add(group);
}
addMountain(27,86,1.5);addMountain(28,84,1.0);addMountain(30,78,0.7);addMountain(32,76,0.6);
addMountain(46,8,1.1);addMountain(44,6,0.7);addMountain(47,11,0.6);
addMountain(35,138,1.3,true);
addMountain(-33,-70,1.2);addMountain(-30,-68,0.75);addMountain(-28,-66,0.55);
addMountain(63,-18,0.85,true);addMountain(60,8,0.7);
addMountain(42,44,0.8);addMountain(-43,170,0.75,true);
addMountain(19,-156,0.85);addMountain(45,88,0.9);addMountain(38,72,0.8);

// ── PALM TREES ──
function addPalmTree(lat,lon,size=1){
  const group=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.02*size,0.033*size,0.28*size,6),new THREE.MeshStandardMaterial({color:0xc4894a,roughness:1}));
  trunk.position.y=0.12*size;
  const lm=new THREE.MeshStandardMaterial({color:0x4caf50,roughness:0.9});
  const lm2=new THREE.MeshStandardMaterial({color:0x66bb6a,roughness:0.9});
  [[0,0.3,0.11],[0.09,0.26,0.09],[-.09,0.26,0.09],[0.12,0.22,0.07],[-.12,0.22,0.07]].forEach((b,i)=>{
    const leaf=new THREE.Mesh(new THREE.SphereGeometry(b[2]*size,8,8),i===0?lm2:lm);
    leaf.position.set(b[0]*size,b[1]*size,0);group.add(leaf);
  });
  group.add(trunk);
  const pos=latLonToVec3(lat,lon,5.1);
  group.position.copy(pos);group.lookAt(new THREE.Vector3(0,0,0));group.rotateX(-Math.PI/2);globe.add(group);
}

// ── MARKERS ──
const markerObjects=[];
function addMarker(dest){
  const group=new THREE.Group();
  const pin=new THREE.Mesh(new THREE.SphereGeometry(0.14,20,20),new THREE.MeshStandardMaterial({color:0xe8826a,roughness:0.4,metalness:0.1}));
  pin.position.copy(latLonToVec3(dest.lat,dest.lon,5.42));group.add(pin);
  const inner=new THREE.Mesh(new THREE.SphereGeometry(0.055,16,16),new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.3}));
  inner.position.copy(latLonToVec3(dest.lat,dest.lon,5.44));group.add(inner);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(0.2,0.025,8,32),new THREE.MeshStandardMaterial({color:0xe8826a,transparent:true,opacity:0.5,roughness:1}));
  ring.position.copy(latLonToVec3(dest.lat,dest.lon,5.42));ring.lookAt(0,0,0);group.add(ring);
  const canvas=document.createElement('canvas');canvas.width=320;canvas.height=80;
  const ctx=canvas.getContext('2d');
  // wood plank background
  const grad=ctx.createLinearGradient(0,0,0,80);
  grad.addColorStop(0,'rgba(180,120,60,0.95)');
  grad.addColorStop(0.5,'rgba(155,98,45,0.95)');
  grad.addColorStop(1,'rgba(130,80,30,0.95)');
  ctx.fillStyle=grad;
  roundRect(ctx,4,16,312,52,10);ctx.fill();
  // wood grain lines
  ctx.strokeStyle='rgba(100,55,15,0.25)';ctx.lineWidth=1;
  for(let y=22;y<68;y+=6){ctx.beginPath();ctx.moveTo(8,y);ctx.lineTo(312,y+2);ctx.stroke();}
  // left darker edge
  ctx.fillStyle='rgba(100,55,15,0.3)';
  roundRect(ctx,4,16,6,52,10);ctx.fill();
  // text - white with slight shadow
  ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=3;ctx.shadowOffsetY=1;
  ctx.fillStyle='#fff8ee';
  ctx.font='bold 27px Arial';ctx.textAlign='center';
  ctx.fillText(dest.emoji+' '+dest.name,162,50);
  ctx.shadowBlur=0;
  const tex=new THREE.CanvasTexture(canvas);
  const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
  sprite.position.copy(latLonToVec3(dest.lat,dest.lon,6.05));sprite.scale.set(2.4,0.6,1);group.add(sprite);
  globe.add(group);markerObjects.push({group,pin,ring,inner,dest});
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function rebuildMarkers(){markerObjects.forEach(m=>globe.remove(m.group));markerObjects.length=0;state.destinations.forEach(d=>addMarker(d));}
rebuildMarkers();

// ── CONTROLS ──
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.06;controls.enableZoom=true;
controls.enablePan=false;controls.minDistance=8;controls.maxDistance=18;
controls.autoRotate=true;controls.autoRotateSpeed=0.5;

// ── RAYCAST ──
const raycaster=new THREE.Raycaster();const mouse=new THREE.Vector2();
const tooltip=document.getElementById('tooltip');
let hoveredDest=null,mouseDownPos={x:0,y:0},isDragging=false;
function updateRaycast(cx,cy){
  mouse.x=(cx/window.innerWidth)*2-1;mouse.y=-(cy/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);let found=null;
  markerObjects.forEach(m=>{if(raycaster.intersectObjects([m.pin,m.ring,m.inner],true).length>0)found=m.dest;});
  return found;
}
renderer.domElement.addEventListener('mousemove',e=>{
  const f=updateRaycast(e.clientX,e.clientY);
  if(f){hoveredDest=f;tooltip.style.left=e.clientX+'px';tooltip.style.top=e.clientY+'px';tooltip.textContent='点击进入 '+f.emoji+' '+f.name;tooltip.style.opacity=1;renderer.domElement.style.cursor='pointer';}
  else{hoveredDest=null;tooltip.style.opacity=0;renderer.domElement.style.cursor='grab';}
});
renderer.domElement.addEventListener('mousedown',e=>{mouseDownPos={x:e.clientX,y:e.clientY};isDragging=false;});
renderer.domElement.addEventListener('mousemove',e=>{const dx=e.clientX-mouseDownPos.x,dy=e.clientY-mouseDownPos.y;if(Math.sqrt(dx*dx+dy*dy)>5)isDragging=true;},{passive:true});
renderer.domElement.addEventListener('mouseup',e=>{if(isDragging){isDragging=false;return;}const f=updateRaycast(e.clientX,e.clientY);if(f)openDest(f.id);});
renderer.domElement.addEventListener('touchend',e=>{if(isDragging){isDragging=false;return;}const t=e.changedTouches[0];const f=updateRaycast(t.clientX,t.clientY);if(f)openDest(f.id);},{passive:true});

function animate(){
  requestAnimationFrame(animate);
  clouds.rotation.y+=0.0005;
  const t=Date.now()*0.0018;
  markerObjects.forEach((m,i)=>{const s=1+0.2*Math.sin(t+i*1.2);m.ring.scale.set(s,s,s);m.ring.material.opacity=0.28+0.25*Math.sin(t+i*1.2);});
  controls.update();renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});

function openDest(id){
  const pageMap={maldives:'maldives.html',bali:'bali.html',bangkok:'bangkok.html',phuket:'phuket.html',abudhabi:'abudhabi.html'};
  const page=pageMap[id];if(page)window.location.href=page;else alert('该目的地页面即将上线 🌏');
}

let selectedEmoji=EMOJIS[0];
document.getElementById('addDestGlobe').addEventListener('click',openModal);
function openModal(){
  selectedEmoji=EMOJIS[0];
  const picker=document.getElementById('emoji-picker');picker.innerHTML='';
  EMOJIS.forEach(em=>{
    const btn=document.createElement('button');btn.className='ep-btn'+(em===selectedEmoji?' selected':'');btn.textContent=em;
    btn.addEventListener('click',()=>{selectedEmoji=em;document.querySelectorAll('.ep-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');});
    picker.appendChild(btn);
  });
  ['new-dest-name','new-dest-lat','new-dest-lon'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('new-dest-name').focus(),100);
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
document.getElementById('new-dest-name').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddDest();});
function confirmAddDest(){
  const name=document.getElementById('new-dest-name').value.trim();if(!name){document.getElementById('new-dest-name').focus();return;}
  const lat=parseFloat(document.getElementById('new-dest-lat').value)||0;
  const lon=parseFloat(document.getElementById('new-dest-lon').value)||0;
  const id='dest_'+Date.now();
  state.destinations.push({id,name,nameEn:name,emoji:selectedEmoji,lat,lon});
  saveState();closeModal();rebuildMarkers();
}
